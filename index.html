// ─── TICKER ─────────────────────────────────────────────────────
function Ticker() {
  const [offset, setOffset] = useState(0);
  useEffect(() => {
    const iv = setInterval(() => setOffset(p => p - 1), 30);
    return () => clearInterval(iv);
  }, []);
  const text = tickerItems.join("   •   ") + "   •   " + tickerItems.join("   •   ");
  return (
    <div style={{ overflow:"hidden", whiteSpace:"nowrap", borderBottom:"1px solid #e5091433", background:"#000" }}>
      <div style={{ display:"inline-block", transform:`translateX(${offset % 1200}px)`, padding:"5px 0" }}>
        {text.split("•").map((item, i) => (
          <span key={i} style={{ fontSize:9, fontFamily:"'Bebas Neue', sans-serif", letterSpacing:1.5, color:item.includes("▼")?"#e74c3c":item.includes("▲")?"#2ecc71":item.includes("LIVE")?"#e50914":"#888", marginRight:12 }}>
            {item.trim()} {i < text.split("•").length-1 && <span style={{color:"#333"}}>•</span>}
          </span>
        ))}
      </div>
    </div>
  );
}

// ─── AI TOOL MODAL ──────────────────────────────────────────────
function AIToolModal({ service, onClose }) {
  const tool = TOOLS_CONFIG[service.toolId] || TOOLS_CONFIG.social;
  const [vals, setVals] = useState({});
  const [output, setOutput] = useState("");
  const [loading, setLoading] = useState(false);
  const [modelUsed, setModelUsed] = useState("");

  const generate = async () => {
    setLoading(true); setOutput("");
    try {
      const prompt = Object.entries(vals).map(([k,v]) => `${k}: ${v}`).join("\n");
      const r = await fetch("/api/chat", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ messages:[{ role:"user", content:`${tool.name} хийж өгнэ үү.\n${prompt}` }], tool: service.toolId })
      });
      const d = await r.json();
      setOutput(d.message?.content || "⚠ Хариулт ирсэнгүй");
      setModelUsed(d.message?.modelUsed || "");
    } catch(e) { setOutput("⚠ Алдаа: " + e.message); }
    setLoading(false);
  };

  return (
    <div style={{ position:"absolute", inset:0, background:"#000", zIndex:100, display:"flex", flexDirection:"column", borderRadius:42, overflow:"hidden" }}>
      {/* Header */}
      <div style={{ padding:"14px 18px 10px", borderBottom:"1px solid #1a1a1a", display:"flex", alignItems:"center", justifyContent:"space-between", background:"#000" }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <button onClick={onClose} style={{ background:"none", border:"none", color:"#888", cursor:"pointer", fontSize:18, lineHeight:1 }}>←</button>
          <span style={{ fontSize:22 }}>{service.icon}</span>
          <div>
            <div style={{ fontFamily:"'Bebas Neue', sans-serif", fontSize:14, color:"#fff", letterSpacing:1.5 }}>{tool.name}</div>
            <div style={{ fontSize:9, color:service.accent }}>{service.tag}</div>
          </div>
        </div>
        {modelUsed && <div style={{ fontSize:8, color:"#555", fontFamily:"Montserrat, sans-serif", background:"#111", padding:"3px 8px", border:"1px solid #222" }}>{modelUsed.includes("haiku")?"HAIKU":modelUsed.includes("sonnet")?"SONNET":"OPUS"}</div>}
      </div>

      {/* Inputs */}
      <div style={{ flex:1, overflowY:"auto", padding:"14px 16px" }}>
        {tool.inputs.map(inp => (
          <div key={inp.id} style={{ marginBottom:12 }}>
            <div style={{ fontSize:9, fontWeight:700, color:"#888", letterSpacing:0.08, textTransform:"uppercase", marginBottom:5 }}>{inp.label}</div>
            {inp.type==="select" ? (
              <select value={vals[inp.id]||""} onChange={e => setVals({...vals,[inp.id]:e.target.value})}
                style={{ width:"100%", background:"#0d0d0d", border:"1px solid #1e1e1e", color:"#e0e0e0", padding:"9px 12px", fontSize:13, fontFamily:"inherit", outline:"none", borderRadius:0 }}>
                <option value="">Сонгох...</option>
                {inp.opts.map(o => <option key={o} value={o}>{o}</option>)}
              </select>
            ) : (
              <input value={vals[inp.id]||""} onChange={e => setVals({...vals,[inp.id]:e.target.value})} placeholder={inp.ph}
                style={{ width:"100%", background:"#0d0d0d", border:"1px solid #1e1e1e", color:"#e0e0e0", padding:"9px 12px", fontSize:13, fontFamily:"inherit", outline:"none", borderRadius:0 }} />
            )}
          </div>
        ))}

        {/* Generate button */}
        <button onClick={generate} disabled={loading}
          style={{ width:"100%", background:loading?"#333":service.accent, border:"none", color:"#fff", padding:"13px", fontSize:12, fontFamily:"'Bebas Neue', sans-serif", letterSpacing:1.5, cursor:loading?"not-allowed":"pointer", marginBottom:16 }}>
          {loading ? "⏳ Үүсгэж байна..." : "⚡ AI-АР ҮҮСГЭХ"}
        </button>

        {/* Output */}
        {output && (
          <div style={{ background:"#0a0a0a", border:"1px solid #1e1e1e", borderTop:`2px solid ${service.accent}`, padding:"14px", fontSize:13, color:"#e0e0e0", lineHeight:1.7, whiteSpace:"pre-wrap" }}>
            {output}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── LOGIN SCREEN ────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [view, setView] = useState("login");
  const [method, setMethod] = useState("phone");
  const [name, setName] = useState("");
  const [phone, setPhone] = useState("");
  const [email, setEmail] = useState("");
  const [pwd, setPwd] = useState("");
  const [msg, setMsg] = useState("");

  const handleLogin = async () => {
    window.currentLoginMethod = method;
    if (method === "phone") {
      document.getElementById("login-phone-hidden").value = phone;
      document.getElementById("login-pwd-phone-hidden").value = pwd;
    } else {
      document.getElementById("login-email-hidden").value = email;
      document.getElementById("login-pwd-email-hidden").value = pwd;
    }
    try { await window.doLogin(); if(window.getSession()) onLogin(window.getSession()); else setMsg("⚠ Нэвтрэх амжилтгүй"); }
    catch(e) { setMsg("⚠ " + e.message); }
  };

  const handleRegister = async () => {
    document.getElementById("reg-name-hidden").value = name;
    document.getElementById("reg-phone-hidden").value = phone;
    document.getElementById("reg-email-hidden").value = email;
    document.getElementById("reg-pwd-hidden").value = pwd;
    try { await window.doRegister(); if(window.getSession()) onLogin(window.getSession()); else setMsg("⚠ Бүртгэл амжилтгүй"); }
    catch(e) { setMsg("⚠ " + e.message); }
  };

  return (
    <div style={{ position:"absolute", inset:0, background:"#000", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:28, borderRadius:42 }}>
      {/* Logo */}
      <div style={{ marginBottom:32, textAlign:"center" }}>
        <div style={{ fontFamily:"'Bebas Neue', sans-serif", fontSize:40, color:"#fff", letterSpacing:6 }}>ULAAN<span style={{color:"#e50914"}}>●</span></div>
        <div style={{ fontSize:10, color:"#555", letterSpacing:3, fontFamily:"Montserrat, sans-serif", marginTop:4 }}>AI MARKETING STUDIO</div>
      </div>

      {/* Toggle */}
      <div style={{ display:"flex", gap:0, marginBottom:24, border:"1px solid #222", width:"100%" }}>
        {["login","register"].map(v => (
          <button key={v} onClick={() => { setView(v); setMsg(""); }}
            style={{ flex:1, padding:"10px", background:view===v?"#e50914":"transparent", border:"none", color:"#fff", fontSize:11, fontFamily:"'Bebas Neue', sans-serif", letterSpacing:2, cursor:"pointer" }}>
            {v==="login"?"НЭВТРЭХ":"БҮРТГҮҮЛЭХ"}
          </button>
        ))}
      </div>

      {view === "login" && (
        <div style={{ width:"100%" }}>
          {/* Method tabs */}
          <div style={{ display:"flex", gap:6, marginBottom:16 }}>
            {["phone","email"].map(m => (
              <button key={m} onClick={() => setMethod(m)}

                {m==="phone"?"📱 Утас":"✉️ Имэйл"}
              </button>
            ))}
          </div>
          {method==="phone" ? (
            <input value={phone} onChange={e=>setPhone(e.target.value)} placeholder="Утасны дугаар"

          ) : (
            <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="Имэйл хаяг"

function ChatPanel({ onClose }) {
  const [msgs, setMsgs] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [model, setModel] = useState("");
  const endRef = useRef(null);

  useEffect(() => { endRef.current?.scrollIntoView({ behavior:"smooth" }); }, [msgs]);

  const send = async (text) => {
    const t = text || input.trim();
    if (!t || loading) return;
    setInput("");
    const newMsgs = [...msgs, { role:"user", content:t }];
    setMsgs(newMsgs);
    setLoading(true);
    try {
      const r = await fetch("/api/chat", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ messages:newMsgs }) });
      const d = await r.json();
      const reply = d.message?.content || "⚠ Хариулт ирсэнгүй";
      setModel(d.message?.modelUsed || "");
      setMsgs([...newMsgs, { role:"assistant", content:reply }]);
    } catch(e) { setMsgs([...newMsgs, { role:"assistant", content:"⚠ Алдаа: "+e.message }]); }
    setLoading(false);
  };

  const quickBtns = ["📊 Маркетингийн стратеги","📱 Instagram пост","🎯 Реклам текст","💎 Брэнд шинжилгээ"];

  return (
    <div style={{ position:"absolute", inset:0, background:"#000", zIndex:100, display:"flex", flexDirection:"column", borderRadius:42, overflow:"hidden" }}>
      {/* Header */}
      <div style={{ padding:"14px 16px 10px", borderBottom:"1px solid #1a1a1a", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <button onClick={onClose} style={{ background:"none", border:"none", color:"#888", cursor:"pointer", fontSize:18 }}>←</button>
          <div style={{ width:6, height:6, background:"#e50914" }} />
          <span style={{ fontFamily:"'Bebas Neue', sans-serif", fontSize:14, color:"#fff", letterSpacing:2 }}>ULAAN AI</span>
        </div>
        {model && <span style={{ fontSize:8, color:"#555", background:"#0d0d0d", padding:"3px 8px", border:"1px solid #1a1a1a" }}>{model.includes("haiku")?"HAIKU":model.includes("opus")?"OPUS":"SONNET"}</span>}
      </div>

      {/* Messages */}
      <div style={{ flex:1, overflowY:"auto", padding:"12px 14px", display:"flex", flexDirection:"column", gap:10 }}>
        {msgs.length === 0 && (
          <div style={{ textAlign:"center", marginTop:40 }}>
            <div style={{ fontSize:32, marginBottom:12 }}>🤖</div>
            <div style={{ fontFamily:"'Bebas Neue', sans-serif", fontSize:16, color:"#fff", letterSpacing:2, marginBottom:6 }}>ULAAN AI</div>
            <div style={{ fontSize:11, color:"#555" }}>Монгол маркетингийн AI туслагч</div>
          </div>
        )}
        {msgs.map((m, i) => (
          <div key={i} style={{ display:"flex", flexDirection:"column", alignItems:m.role==="user"?"flex-end":"flex-start" }}>
            <div style={{ maxWidth:"82%", padding:"10px 14px", fontSize:13, lineHeight:1.6, borderRadius:m.role==="user"?"12px 12px 2px 12px":"2px 12px 12px 12px", background:m.role==="user"?"#e50914":"#111", color:"#fff", border:m.role==="user"?"none":"1px solid #1e1e1e" }}>
              {m.content}
            </div>
          </div>
        ))}
        {loading && (
          <div style={{ display:"flex", gap:4, padding:"10px 14px", background:"#111", border:"1px solid #1e1e1e", width:"fit-content", borderRadius:"2px 12px 12px 12px" }}>
            {[0,1,2].map(i => <div key={i} style={{ width:6, height:6, borderRadius:"50%", background:"#555", animation:"bounce 1.2s infinite", animationDelay:`${i*0.2}s` }} />)}
          </div>
        )}
        <div ref={endRef} />
      </div>

      {/* Quick buttons */}
      {msgs.length === 0 && (
        <div style={{ padding:"0 12px 8px", display:"flex", gap:6, flexWrap:"wrap" }}>
          {quickBtns.map(q => (
            <button key={q} onClick={() => send(q)}
              style={{ background:"#111", border:"1px solid #222", color:"#888", padding:"5px 10px", fontSize:10, cursor:"pointer", borderRadius:4 }}>{q}</button>
          ))}
        </div>
      )}

      {/* Input */}
      <div style={{ padding:"10px 12px", display:"flex", gap:8, borderTop:"1px solid #1a1a1a" }}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()}
          placeholder="Асуултаа бичнэ үү..."
          style={{ flex:1, background:"#0d0d0d", border:"1px solid #1e1e1e", color:"#fff", padding:"9px 12px", fontSize:13, fontFamily:"inherit", outline:"none", borderRadius:0 }} />
        <button onClick={() => send()} disabled={loading}
          style={{ background:"#e50914", border:"none", padding:"9px 14px", cursor:"pointer", fontSize:16, color:"#fff" }}>➤</button>
      </div>

      <style>{`@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }`}</style>
    </div>
  );
}

window.clearRateLimit=function(id){try{localStorage.removeItem('uc_rl_'+id);}catch(e){}};
window.doLogin=async function(){var hash='',pwd='',user=null,rlId='';try{var method=window.currentLoginMethod||'phone';if(method==='phone'){var phone=(document.getElementById('login-phone')?.value||'').trim().replace(/\s/g,'');pwd=document.getElementById('login-pwd-phone')?.value||'';if(!phone||!pwd){alert('⚠ Утас болон нууц үгээ оруулна уу');return;}rlId='login_'+phone;if(checkRateLimit(rlId)){alert('⚠ Хэт олон оролдлого');return;}user=getUsers()['phone:'+phone];if(user)hash=await sha256(pwd+phone);if(!user||(user.pwd!==hash&&user.pwd!==pwd)){alert('⚠ Утас эсвэл нууц үг буруу');return;};}else if(method==='email'){var email=(document.getElementById('login-email')?.value||'').trim().toLowerCase();pwd=document.getElementById('login-pwd-email')?.value||'';if(!email||!pwd){alert('⚠ Имэйл болон нууц үгээ оруулна уу');return;}rlId='login_'+email.replace('@','_');if(checkRateLimit(rlId)){alert('⚠ Хэт олон оролдлого');return;}user=getUsers()['email:'+email];if(user)hash=await sha256(pwd+email);if(!user||(user.pwd!==hash&&user.pwd!==pwd)){alert('⚠ Имэйл эсвэл нууц үг буруу');return;};}clearRateLimit(rlId);var session=Object.assign({},user,{_token:genToken(),_loginAt:Date.now()});delete session.pwd;sessSet('uc_session',JSON.stringify(session));if(window.onLoggedIn)onLoggedIn(session);}catch(e){console.error('Login error:',e.message);alert('⚠ Алдаа: '+e.message);}};
window.doRegister=async function(){try{var name=(document.getElementById('reg-name')?.value||'').trim(),phone=(document.getElementById('reg-phone')?.value||'').trim().replace(/\s/g,''),email=(document.getElementById('reg-email')?.value||'').trim().toLowerCase(),pwd=document.getElementById('reg-pwd')?.value||'';if(!name){alert('⚠ Нэрээ оруулна уу');return;}if(!phone&&!email){alert('⚠ Утас эсвэл имэйл оруулна уу');return;}if(!pwd||pwd.length<6){alert('⚠ Нууц үг 6+ тэмдэгт');return;}var users=getUsers(),salt=phone||email,hash=await sha256(pwd+salt),key=phone?'phone:'+phone:'email:'+email;if(users[key]){alert('⚠ Аль хэдийн бүртгэлтэй');return;}users[key]={name:name,phone:phone||'',email:email||'',pwd:hash,createdAt:new Date().toISOString()};saveUsers(users);var session=Object.assign({},users[key],{_token:genToken(),_loginAt:Date.now()});delete session.pwd;sessSet('uc_session',JSON.stringify(session));if(window.onLoggedIn)onLoggedIn(session);}catch(e){console.error('Register error:',e.message);alert('⚠ Алдаа: '+e.message);}};
window.doLogout=function(){try{localStorage.removeItem('sess_uc_session');}catch(e){}if(window.onLoggedOut)onLoggedOut();else window.location.reload();};
window.showForgotPassword=function(){alert('Утасны дугаараа admin-д мэдэгдэнэ үү. Нууц үгийг шинэчилж өгнө.');};
window.saveApiKey=function(){alert('API key Vercel сервер дээр тохируулагдсан байна.');};
console.log('[AUTH-CORE] ✅ loaded');
</script>
